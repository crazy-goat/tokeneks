<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenEKS Dashboard</title>
<script src="/static/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
  h1 { margin-bottom: 20px; font-size: 1.5rem; }
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .card { background: #1e293b; border-radius: 8px; padding: 16px; text-align: center; }
  .card .value { font-size: 1.5rem; font-weight: 700; color: #38bdf8; }
  .card .label { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
  .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 420px), 1fr)); gap: 20px; margin-bottom: 24px; }
  .chart-container { background: #1e293b; border-radius: 8px; padding: 16px; }
  .chart-container h2 { font-size: 1rem; margin-bottom: 12px; }
  #reloadBtn:hover { background: #475569; }
  table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; }
  th, td { padding: 10px 12px; font-size: 0.82rem; vertical-align: top; }
  th { text-align: left; }
  th:nth-child(n+6), td:nth-child(n+6) { text-align: right; }
  th { background: #334155; color: #cbd5e1; position: sticky; top: 0; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { background: #3e5068; }
  th .sort-arrow { margin-left: 4px; font-size: 0.7rem; opacity: 0.4; }
  th.sorted .sort-arrow { opacity: 1; color: #38bdf8; }
  tr:nth-child(even) { background: #162032; }
  tr:hover { background: #1e293b; }
  .agent { font-weight: 700; text-transform: uppercase; font-size: 0.65rem; padding: 3px 8px; border-radius: 4px; display: inline-block; }
  .agent-PI { background: #7c3aed; color: #fff; }
  .agent-OpenCode { background: #059669; color: #fff; }
  .agent-Claude { background: #c2410c; color: #fff; }
  .session-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .sub-badge { display:inline-block; font-size:0.68rem; font-weight:700; padding:2px 6px; border-radius:999px; }
  .sub-badge.child { background:#7f1d1d; color:#fecaca; }
  .sub-badge.parent { background:#1d4ed8; color:#dbeafe; }
  .sub-note { color:#94a3b8; font-size:0.72rem; margin-top:4px; }
  .cell-main { display:block; }
  .cell-sub { display:block; margin-top:4px; font-size:0.82rem; color:#94a3b8; font-weight:400; }
  .cell-sub.emph { color:#cbd5e1; font-weight:700; }
  .models { display: flex; flex-direction: column; gap: 4px; }
  .model-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .model-name { font-weight: 600; min-width: 130px; }
  .cost { font-weight: 700; color: #ffffff; white-space: nowrap; }
  .small { color: #94a3b8; font-size: 0.75rem; white-space: nowrap; }
  .session-row td { border-bottom: 1px solid #334155; }
  .session-row { cursor: pointer; }
  canvas { max-height: 300px; }
  .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; align-items: center; }
  .filter-count { font-size: 0.78rem; color: #64748b; margin-left: auto; }
  /* multi-select */
  .ms { position: relative; display: inline-block; }
  .ms-btn { background: #1e293b; color: #e2e8f0; border: 1px solid #475569; border-radius: 6px; padding: 6px 28px 6px 10px; font-size: 0.82rem; cursor: pointer; white-space: nowrap; position: relative; min-width: 110px; text-align: left; }
  .ms-btn::after { content: '▾'; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 0.65rem; color: #94a3b8; pointer-events: none; }
  .ms-btn:focus, .ms-btn:focus-visible { outline: none; border-color: #38bdf8; }
  .ms-btn.has-selection { border-color: #38bdf8; color: #38bdf8; }
  .ms-panel { display: none; position: absolute; top: calc(100% + 4px); left: 0; background: #1e293b; border: 1px solid #475569; border-radius: 6px; padding: 4px 0; min-width: 100%; max-height: 260px; overflow-y: auto; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .ms-panel.open { display: block; }
  .ms-opt { display: flex; align-items: center; gap: 8px; padding: 6px 10px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
  .ms-opt:hover { background: #2a3a52; }
  .ms-opt input { accent-color: #38bdf8; cursor: pointer; }
</style>
</head>
<body>
<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">
<h1>🤖 TokenEKS Dashboard</h1>
<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
  <select id="quickRange" style="background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:6px;padding:8px 10px;font-size:0.9rem">
    <option value="last7">Last 7 days</option>
    <option value="today">Today</option>
    <option value="yesterday">Yesterday</option>
    <option value="last30">Last 30 days</option>
    <option value="thisMonth">This month</option>
    <option value="lastMonth">Last month</option>
    <option value="custom">Custom</option>
  </select>
  <label style="font-size:0.8rem;color:#94a3b8">From <input id="startDate" type="date" style="margin-left:4px;background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:6px;padding:7px 8px"></label>
  <label style="font-size:0.8rem;color:#94a3b8">To <input id="endDate" type="date" style="margin-left:4px;background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:6px;padding:7px 8px"></label>
  <button id="reloadBtn" style="background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:0.9rem">🔄 Reload</button>
</div>
</div>
<div class="summary" id="summary"></div>
<div class="charts">
  <div class="chart-container"><h2>Total Cost by Agent</h2><canvas id="agentCostChart"></canvas></div>
  <div class="chart-container"><h2>Tokens by Agent (stacked)</h2><canvas id="agentTokenChart"></canvas></div>
  <div class="chart-container"><h2>Daily Cost Trend</h2><canvas id="dailyCostChart"></canvas></div>
  <div class="chart-container"><h2>Top Sessions by Cost</h2><canvas id="sessionCostChart"></canvas></div>
</div>
<h2 style="margin-bottom:10px">Sessions</h2>
<div class="filters" id="filters">
  <label>Agent:</label><div class="ms" id="filterAgent"></div>
  <label>Provider:</label><div class="ms" id="filterProvider"></div>
  <label>Model:</label><div class="ms" id="filterModel"></div>
  <label style="display:flex;align-items:center;gap:6px;font-size:0.82rem;color:#cbd5e1;margin-left:8px;">
    <input id="hideSubsessions" type="checkbox" checked style="accent-color:#38bdf8;">
    Hide subsessions
  </label>
  <span class="filter-count" id="filterCount"></span>
</div>
<div style="overflow-x:auto">
<table>
<thead>
<tr>
<th class="sortable" data-sort="date">Date <span class="sort-arrow">▼</span></th>
<th class="sortable" data-sort="lastMessage">Last activity <span class="sort-arrow">↕</span></th><th>Agent</th><th>Project</th><th>Models</th>
<th class="sortable" data-sort="msgs">Msgs <span class="sort-arrow">↕</span></th>
<th class="sortable" data-sort="tools">Tools <span class="sort-arrow">↕</span></th>
<th class="sortable" data-sort="prompt">Input <span class="sort-arrow">↕</span></th>
<th class="sortable" data-sort="output">Output <span class="sort-arrow">↕</span></th>
<th class="sortable" data-sort="cacheR">Cache R <span class="sort-arrow">↕</span></th>
<th class="sortable" data-sort="cacheW">Cache W <span class="sort-arrow">↕</span></th>
<th class="sortable" data-sort="cachePct">Cache % <span class="sort-arrow">↕</span></th>
<th class="sortable" data-sort="total">Total <span class="sort-arrow">↕</span></th>
<th class="sortable" data-sort="cost">Cost <span class="sort-arrow">↕</span></th>
<th class="sortable" data-sort="costPerM">$/1M <span class="sort-arrow">↕</span></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
/* ===== multi-select component ===== */
class MultiSelect {
  constructor(container, placeholder, onChange) {
    this.container = container;
    this.placeholder = placeholder || 'All';
    this.onChange = onChange;
    this.selected = new Set();
    this._build();
  }
  _build() {
    this.container.innerHTML = '';
    this.btn = document.createElement('button');
    this.btn.type = 'button';
    this.btn.className = 'ms-btn';
    this.btn.textContent = this.placeholder;
    this.btn.addEventListener('click', (e) => {
      e.stopPropagation();
      this.panel.classList.toggle('open');
    });
    this.panel = document.createElement('div');
    this.panel.className = 'ms-panel';
    this.container.appendChild(this.btn);
    this.container.appendChild(this.panel);
    // close on outside click
    this._onDocClick = (e) => {
      if (!this.container.contains(e.target)) this.panel.classList.remove('open');
    };
    document.addEventListener('click', this._onDocClick);
  }
  setOptions(options) {
    this.panel.innerHTML = '';
    for (const opt of options) {
      const lbl = document.createElement('label');
      lbl.className = 'ms-opt';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = opt;
      cb.checked = this.selected.has(opt);
      cb.addEventListener('change', () => {
        if (cb.checked) this.selected.add(opt);
        else this.selected.delete(opt);
        this._updateLabel();
        this.onChange();
      });
      lbl.appendChild(cb);
      lbl.appendChild(document.createTextNode(opt));
      this.panel.appendChild(lbl);
    }
    this.selected = new Set([...this.selected].filter((opt) => options.includes(opt)));
    this._updateLabel();
  }
  setSelectedValues(values) {
    const available = new Set([...this.panel.querySelectorAll('input[type="checkbox"]')].map(cb => cb.value));
    const nextValues = Array.isArray(values) ? values : [];
    this.selected = new Set(nextValues.filter((value) => available.has(value)));
    this.panel.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.checked = this.selected.has(cb.value);
    });
    this._updateLabel();
  }
  getValues() {
    return this.selected.size === 0 ? null : [...this.selected];
  }
  _updateLabel() {
    if (this.selected.size === 0) {
      this.btn.textContent = this.placeholder;
      this.btn.classList.remove('has-selection');
    } else if (this.selected.size <= 2) {
      this.btn.textContent = [...this.selected].join(', ');
      this.btn.classList.add('has-selection');
    } else {
      this.btn.textContent = this.selected.size + ' selected';
      this.btn.classList.add('has-selection');
    }
  }
}

/* ===== main app ===== */
const charts = [];
let allSessions = [];
let sortCol = 'date';
let sortDir = -1;

let filterAgent, filterProvider, filterModel;

const filterStateKey = 'tokeneks.dashboardFilters';
let pendingFilterState = null;

function readFilterState() {
  try {
    const raw = sessionStorage.getItem(filterStateKey);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : null;
  } catch {
    return null;
  }
}

function saveFilterState() {
  try {
    const savedAgent = filterAgent?.getValues() ?? pendingFilterState?.agent ?? [];
    const savedProvider = filterProvider?.getValues() ?? pendingFilterState?.provider ?? [];
    const savedModel = filterModel?.getValues() ?? pendingFilterState?.model ?? [];
    sessionStorage.setItem(filterStateKey, JSON.stringify({
      quickRange: document.getElementById('quickRange').value,
      startDate: document.getElementById('startDate').value,
      endDate: document.getElementById('endDate').value,
      hideSubsessions: document.getElementById('hideSubsessions').checked,
      agent: savedAgent,
      provider: savedProvider,
      model: savedModel,
    }));
  } catch {
  }
}

function restoreDateState(state) {
  const quickRangeEl = document.getElementById('quickRange');
  const startDateEl = document.getElementById('startDate');
  const endDateEl = document.getElementById('endDate');
  if (!state) {
    applyQuickRange('last7');
    return;
  }
  quickRangeEl.value = state.quickRange || 'last7';
  if (quickRangeEl.value === 'custom') {
    startDateEl.value = state.startDate || '';
    endDateEl.value = state.endDate || '';
  } else {
    applyQuickRange(quickRangeEl.value);
  }
  document.getElementById('hideSubsessions').checked = state.hideSubsessions === undefined ? true : state.hideSubsessions === true;
  pendingFilterState = state;
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function formatDateInput(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getSelectedRange() {
  return {
    start: document.getElementById('startDate').value,
    end: document.getElementById('endDate').value,
  };
}

function applyQuickRange(value) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let start = '';
  let end = '';
  if (value === 'today') {
    start = end = formatDateInput(today);
  } else if (value === 'yesterday') {
    const d = new Date(today); d.setDate(d.getDate() - 1);
    start = end = formatDateInput(d);
  } else if (value === 'last7') {
    const d = new Date(today); d.setDate(d.getDate() - 6);
    start = formatDateInput(d); end = formatDateInput(today);
  } else if (value === 'last30') {
    const d = new Date(today); d.setDate(d.getDate() - 29);
    start = formatDateInput(d); end = formatDateInput(today);
  } else if (value === 'thisMonth') {
    const d = new Date(today.getFullYear(), today.getMonth(), 1);
    start = formatDateInput(d); end = formatDateInput(today);
  } else if (value === 'lastMonth') {
    const startD = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    const endD = new Date(today.getFullYear(), today.getMonth(), 0);
    start = formatDateInput(startD); end = formatDateInput(endD);
  }
  if (value !== 'custom') {
    document.getElementById('startDate').value = start;
    document.getElementById('endDate').value = end;
  }
}

function destroyCharts() {
  for (const c of charts) c.destroy();
  charts.length = 0;
}

function clearTable() {
  document.getElementById('tbody').innerHTML = '';
}

function modelDisplay(m) {
  if (m.provider) return m.provider + '/' + m.model;
  return m.model;
}

function cachePctHtml(s) {
  const cr = s.totalCacheRead, inp = s.totalInput;
  const pct = (inp + cr) > 0 ? cr / (inp + cr) * 100 : 0;
  const cls = pct >= 50 ? 'color:#22c55e' : pct >= 20 ? 'color:#fbbf24' : '';
  return `<span style="${cls};font-weight:600">${pct.toFixed(1)}%</span>`;
}

function getSortValue(s) {
  switch (sortCol) {
    case 'total': return s.totalInput + s.totalOutput + s.totalCacheRead + s.totalCacheWrite;
    case 'date': return s.date;
    case 'prompt': return s.promptInput || s.totalInput;
    case 'output': return s.totalOutput;
    case 'cacheR': return s.totalCacheRead;
    case 'cacheW': return s.totalCacheWrite;
    case 'cachePct': { const cr = s.totalCacheRead, inp = s.totalInput; return (inp + cr) > 0 ? cr / (inp + cr) * 100 : 0; }
    case 'lastMessage': return s.lastMessage || '';
    case 'msgs': return s.messages;
    case 'tools': return s.toolCalls;
    case 'cost': return s.totalCost;
    case 'costPerM': { const t = s.totalInput + s.totalOutput + s.totalCacheRead + s.totalCacheWrite; return t > 0 ? s.totalCost / t * 1e6 : 0; }
    default: return 0;
  }
}

function getFilteredSessions() {
  const agents = filterAgent.getValues();
  const providers = filterProvider.getValues();
  const models = filterModel.getValues();
  const hideSubsessions = document.getElementById('hideSubsessions').checked;
  return allSessions.filter(s => {
    if (hideSubsessions && s.isSubsession) return false;
    if (agents && !agents.includes(s.agent)) return false;
    if (providers || models) {
      const hasMatch = s.models.some(m => {
        if (providers && !providers.includes(m.provider)) return false;
        if (models && !models.includes(m.model)) return false;
        return true;
      });
      if (!hasMatch) return false;
    }
    return true;
  });
}

function populateFilters() {
  const agents = [...new Set(allSessions.map(s => s.agent))].sort();
  const providers = [...new Set(allSessions.flatMap(s => s.models.map(m => m.provider)).filter(p => p))].sort();
  const models = [...new Set(allSessions.flatMap(s => s.models.map(m => m.model)))].sort();

  filterAgent.setOptions(agents);
  filterProvider.setOptions(providers);
  filterModel.setOptions(models);

  if (pendingFilterState) {
    filterAgent.setSelectedValues(pendingFilterState.agent);
    filterProvider.setSelectedValues(pendingFilterState.provider);
    filterModel.setSelectedValues(pendingFilterState.model);
    pendingFilterState = null;
  }
}

function renderTable() {
  clearTable();
  const sessions = getFilteredSessions();
  const titleMap = new Map(allSessions.map(s => [`${s.agent}:${s.id}`, s]));
  const childrenByParent = new Map();
  for (const sess of allSessions) {
    if (!sess.parentId) continue;
    const key = `${sess.agent}:${sess.parentId}`;
    if (!childrenByParent.has(key)) childrenByParent.set(key, []);
    childrenByParent.get(key).push(sess);
  }

  function aggregateWithChildren(session, seen = new Set()) {
    const key = `${session.agent}:${session.id}`;
    if (seen.has(key)) {
      return { messages: 0, toolCalls: 0, promptInput: 0, totalOutput: 0, totalCacheRead: 0, totalCacheWrite: 0, totalCost: 0, totalTokens: 0, childCount: 0 };
    }
    seen.add(key);
    const total = {
      messages: session.messages || 0,
      toolCalls: session.toolCalls || 0,
      promptInput: session.promptInput || session.totalInput || 0,
      totalOutput: session.totalOutput || 0,
      totalCacheRead: session.totalCacheRead || 0,
      totalCacheWrite: session.totalCacheWrite || 0,
      totalCost: session.totalCost || 0,
      totalTokens: (session.totalInput || 0) + (session.totalOutput || 0) + (session.totalCacheRead || 0) + (session.totalCacheWrite || 0),
      childCount: 0,
    };
    for (const child of (childrenByParent.get(key) || [])) {
      const childAgg = aggregateWithChildren(child, seen);
      total.messages += childAgg.messages;
      total.toolCalls += childAgg.toolCalls;
      total.promptInput += childAgg.promptInput;
      total.totalOutput += childAgg.totalOutput;
      total.totalCacheRead += childAgg.totalCacheRead;
      total.totalCacheWrite += childAgg.totalCacheWrite;
      total.totalCost += childAgg.totalCost;
      total.totalTokens += childAgg.totalTokens;
      total.childCount += 1 + childAgg.childCount;
    }
    return total;
  }
  const sorted = [...sessions].sort((a, b) => {
    const va = getSortValue(a);
    const vb = getSortValue(b);
    if (typeof va === 'string') return sortDir * va.localeCompare(vb);
    return sortDir * (va - vb);
  });

  document.getElementById('filterCount').textContent = `${sorted.length} / ${allSessions.length} sessions`;

  const tbody = document.getElementById('tbody');
  for (const s of sorted) {
    const tr = document.createElement('tr');
    tr.className = 'session-row';
    const modelsHtml = s.models.map((m) => {
      const name = modelDisplay(m);
      return `<div class="model-row">
        <span class="model-name">${escHtml(name)}</span>
      </div>`;
    }).join('');
    const relationBadges = [];
    if (s.isSubsession) relationBadges.push('<span class="sub-badge child">subsession</span>');
    if (s.childCount > 0) relationBadges.push(`<span class="sub-badge parent">${s.childCount} sub${s.childCount === 1 ? '' : 's'}</span>`);
    let relationNote = '';
    if (s.parentId) {
      const parent = titleMap.get(`${s.agent}:${s.parentId}`);
      const label = parent ? (parent.project || parent.id) : s.parentId;
      relationNote = `<div class="sub-note">↳ parent: ${label}</div>`;
    }
    const aggregate = s.childCount > 0 ? aggregateWithChildren(s) : null;
    const mainTotalTokens = (s.totalInput + s.totalOutput + s.totalCacheRead + s.totalCacheWrite);
    const mainCostPerM = mainTotalTokens > 0 ? s.totalCost / mainTotalTokens * 1e6 : 0;
    const sub = (main, secondary, emph = false) => secondary ? `<span class="cell-main">${main}</span><span class="cell-sub${emph ? ' emph' : ''}">${secondary}</span>` : `<span class="cell-main">${main}</span>`;
    const cacheWriteMain = (aggregate ? aggregate.totalCacheWrite : s.totalCacheWrite).toLocaleString();
    const cacheWriteSecondary = aggregate ? s.totalCacheWrite.toLocaleString() : '';
    tr.innerHTML = `
      <td>${sub(s.date, '')}</td>
      <td>${sub(s.lastMessage || '–', '')}</td>
      <td>${sub(`<span class="agent agent-${s.agent === 'OpenCode' ? 'OpenCode' : s.agent}">${escHtml(s.agent)}</span>`, '')}</td>
      <td title="${escHtml(s.project)}"><div class="session-meta"><span>${escHtml(s.project.length > 32 ? s.project.slice(0,30)+'..' : s.project)}</span>${relationBadges.join('')}</div>${relationNote}${aggregate ? `<div class="cell-sub">↳ with ${aggregate.childCount} sub${aggregate.childCount === 1 ? 'session' : 'sessions'}</div>` : ''}</td>
      <td><div class="models">${modelsHtml}</div></td>
      <td>${sub(s.messages.toLocaleString(), aggregate ? aggregate.messages.toLocaleString() : '')}</td>
      <td>${sub(s.toolCalls.toLocaleString(), aggregate ? aggregate.toolCalls.toLocaleString() : '')}</td>
      <td>${sub((s.promptInput || s.totalInput).toLocaleString(), aggregate ? aggregate.promptInput.toLocaleString() : '')}</td>
      <td>${sub(s.totalOutput.toLocaleString(), aggregate ? aggregate.totalOutput.toLocaleString() : '')}</td>
      <td>${sub(s.totalCacheRead.toLocaleString(), aggregate ? aggregate.totalCacheRead.toLocaleString() : '')}</td>
      <td>${sub(cacheWriteMain, cacheWriteSecondary)}</td>
      <td>${sub(cachePctHtml(s), '')}</td>
      <td>${sub(mainTotalTokens.toLocaleString(), aggregate ? aggregate.totalTokens.toLocaleString() : '')}</td>
      <td class="cost">${sub(`$${s.totalCost.toFixed(2)}`, aggregate ? `$${aggregate.totalCost.toFixed(2)}` : '', true)}</td>
      <td class="small">${sub(`$${mainCostPerM.toFixed(2)}`, aggregate ? `$${(aggregate.totalTokens > 0 ? aggregate.totalCost / aggregate.totalTokens * 1e6 : 0).toFixed(2)}` : '', true)}</td>
    `;
    tr.addEventListener('click', () => { window.location.href = `/detail?agent=${encodeURIComponent(s.agent)}&id=${encodeURIComponent(s.id)}`; });
    tbody.appendChild(tr);
  }

  document.querySelectorAll('th.sortable').forEach(th => {
    th.classList.toggle('sorted', th.dataset.sort === sortCol);
    const arrow = th.querySelector('.sort-arrow');
    if (th.dataset.sort === sortCol) {
      arrow.textContent = sortDir === 1 ? '▲' : '▼';
    } else {
      arrow.textContent = '↕';
    }
  });
}

async function loadData() {
  destroyCharts();
  const range = getSelectedRange();
  const params = new URLSearchParams();
  if (range.start) params.set('start', range.start);
  if (range.end) params.set('end', range.end);
  const res = await fetch('/api/sessions' + (params.toString() ? `?${params.toString()}` : ''));
  if (!res.ok) { alert('Failed to load data'); return; }
  allSessions = await res.json();

  populateFilters();

  const sum = (arr, fn) => arr.reduce((a, b) => a + fn(b), 0);
  const totalCost = sum(allSessions, s => s.totalCost);
  const totalInput = sum(allSessions, s => s.totalInput);
  const totalOutput = sum(allSessions, s => s.totalOutput);
  const totalCR = sum(allSessions, s => s.totalCacheRead);
  const totalCW = sum(allSessions, s => s.totalCacheWrite);
  const totalMsgs = sum(allSessions, s => s.messages);
  const totalToolCalls = sum(allSessions, s => s.toolCalls);

  const summaryEl = document.getElementById('summary');
  const cards = [
    { label: 'Total Cost', value: '$'+totalCost.toFixed(2) },
    { label: 'Input Tokens', value: totalInput.toLocaleString() },
    { label: 'Output Tokens', value: totalOutput.toLocaleString() },
    { label: 'Cache Read', value: totalCR.toLocaleString() },
    { label: 'Cache Write', value: totalCW.toLocaleString() },
    { label: 'Messages', value: totalMsgs.toLocaleString() },
    { label: 'Tool Calls', value: totalToolCalls.toLocaleString() },
    { label: 'Sessions', value: allSessions.length.toLocaleString() },
  ];
  summaryEl.innerHTML = cards.map(c => `<div class="card"><div class="value">${c.value}</div><div class="label">${c.label}</div></div>`).join('');

  renderTable();

  const byAgent = {};
  const byAgentTokens = {};
  const daily = {};
  for (const s of allSessions) {
    byAgent[s.agent] = (byAgent[s.agent] || 0) + s.totalCost;
    byAgentTokens[s.agent] = byAgentTokens[s.agent] || { input:0, output:0, cr:0, cw:0 };
    byAgentTokens[s.agent].input += s.totalInput;
    byAgentTokens[s.agent].output += s.totalOutput;
    byAgentTokens[s.agent].cr += s.totalCacheRead;
    byAgentTokens[s.agent].cw += s.totalCacheWrite;
    const day = s.date.slice(0,10);
    daily[day] = (daily[day] || 0) + s.totalCost;
  }

  charts.push(new Chart(document.getElementById('agentCostChart'), {
    type: 'bar',
    data: {
      labels: Object.keys(byAgent),
      datasets: [{ data: Object.values(byAgent), backgroundColor: ['#7c3aed','#059669','#c2410c'], borderRadius: 6, borderWidth: 0 }]
    },
    options: {
      responsive:true,
      maintainAspectRatio:false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color:'#cbd5e1' }, grid: { display: false } },
        y: { ticks: { color:'#94a3b8' }, grid: { color:'#334155' } }
      }
    }
  }));

  const agents = Object.keys(byAgentTokens);
  charts.push(new Chart(document.getElementById('agentTokenChart'), {
    type: 'bar',
    data: {
      labels: agents,
      datasets: [
        { label: 'Input', data: agents.map(a=>byAgentTokens[a].input), backgroundColor: '#38bdf8' },
        { label: 'Output', data: agents.map(a=>byAgentTokens[a].output), backgroundColor: '#ef4444' },
        { label: 'Cache Read', data: agents.map(a=>byAgentTokens[a].cr), backgroundColor: '#94a3b8' },
        { label: 'Cache Write', data: agents.map(a=>byAgentTokens[a].cw), backgroundColor: '#22c55e' },
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, scales: { x:{stacked:true, ticks:{color:'#94a3b8'}}, y:{stacked:true, ticks:{color:'#94a3b8'}, grid:{color:'#334155'}} }, plugins:{legend:{position:'bottom',labels:{color:'#cbd5e1'}}}}
  }));

  const days = Object.keys(daily).sort();
  charts.push(new Chart(document.getElementById('dailyCostChart'), {
    type: 'line',
    data: {
      labels: days,
      datasets: [{ label: 'Cost', data: days.map(d=>daily[d]), borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,0.1)', fill:true, tension:0.3, pointBackgroundColor:'#38bdf8' }]
    },
    options: { responsive:true, maintainAspectRatio:false, scales: { x:{ticks:{color:'#94a3b8'}}, y:{ticks:{color:'#94a3b8'}, grid:{color:'#334155'}} }, plugins:{legend:{position:'bottom',labels:{color:'#cbd5e1'}}}}
  }));

  const top = [...allSessions].sort((a,b)=>b.totalCost - a.totalCost).slice(0,12);
  charts.push(new Chart(document.getElementById('sessionCostChart'), {
    type: 'bar',
    data: {
      labels: top.map(s => s.agent + ' ' + s.id.slice(0,8)),
      datasets: [{ label: 'Cost', data: top.map(s=>s.totalCost), backgroundColor: '#ffffff', borderRadius:4 }]
    },
    options: {
      responsive:true, maintainAspectRatio:false, indexAxis:'y',
      scales: { x:{ticks:{color:'#94a3b8'}, grid:{color:'#334155'}}, y:{ticks:{color:'#cbd5e1'}} },
      plugins:{legend:{display:false}},
      onClick: (e, elements) => {
        if (elements.length > 0) {
          const idx = elements[0].index;
          const session = top[idx];
          window.location.href = `/detail?agent=${encodeURIComponent(session.agent)}&id=${encodeURIComponent(session.id)}`;
        }
      },
      onHover: (e, elements) => {
        e.native.target.style.cursor = elements.length > 0 ? 'pointer' : '';
      }
    }
  }));

  const canvas = document.getElementById('sessionCostChart');
  canvas.onclick = function(evt) {
    const c = Chart.getChart(this);
    if (!c) return;
    const rect = this.getBoundingClientRect();
    const x = evt.clientX - rect.left;
    const y = evt.clientY - rect.top;
    const yScale = c.scales.y;
    if (x < yScale.left && yScale.ticks) {
      for (const tick of yScale.ticks) {
        const tickY = yScale.getPixelForTick(tick.value);
        if (Math.abs(tickY - y) < 15) {
          const idx = tick.value;
          const session = top[idx];
          if (session) {
            window.location.href = `/detail?agent=${encodeURIComponent(session.agent)}&id=${encodeURIComponent(session.id)}`;
          }
          break;
        }
      }
    }
  };
  canvas.onmousemove = function(evt) {
    const c = Chart.getChart(this);
    if (!c) return;
    const rect = this.getBoundingClientRect();
    const x = evt.clientX - rect.left;
    const y = evt.clientY - rect.top;
    const yScale = c.scales.y;
    if (x < yScale.left && yScale.ticks) {
      let overLabel = false;
      for (const tick of yScale.ticks) {
        const tickY = yScale.getPixelForTick(tick.value);
        if (Math.abs(tickY - y) < 15) { overLabel = true; break; }
      }
      this.style.cursor = overLabel ? 'pointer' : '';
    } else {
      this.style.cursor = '';
    }
  };
}

// init multi-select filters
filterAgent = new MultiSelect(document.getElementById('filterAgent'), 'All', () => { saveFilterState(); renderTable(); });
filterProvider = new MultiSelect(document.getElementById('filterProvider'), 'All', () => { saveFilterState(); renderTable(); });
filterModel = new MultiSelect(document.getElementById('filterModel'), 'All', () => { saveFilterState(); renderTable(); });

// sort headers
document.querySelectorAll('th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if (sortCol === col) { sortDir *= -1; }
    else { sortCol = col; sortDir = -1; }
    renderTable();
  });
});

document.getElementById('reloadBtn').addEventListener('click', loadData);
document.getElementById('hideSubsessions').addEventListener('change', () => {
  saveFilterState();
  renderTable();
});
document.getElementById('quickRange').addEventListener('change', (e) => {
  applyQuickRange(e.target.value);
  saveFilterState();
  loadData();
});
document.getElementById('startDate').addEventListener('change', () => {
  document.getElementById('quickRange').value = 'custom';
  saveFilterState();
  loadData();
});
document.getElementById('endDate').addEventListener('change', () => {
  document.getElementById('quickRange').value = 'custom';
  saveFilterState();
  loadData();
});
restoreDateState(readFilterState());
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
